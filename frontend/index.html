<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>El Cuarto Impacto · Acceso</title>
<link rel="icon" type="image/svg+xml" href="/img/logo.svg">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <svg width="56" height="56" viewBox="0 0 28 28" fill="none">
        <rect x="0" y="0" width="12" height="12" rx="2.5" fill="#1e3a5f"/>
        <rect x="15" y="0" width="12" height="12" rx="2.5" fill="#1e3a5f"/>
        <rect x="0" y="15" width="12" height="12" rx="2.5" fill="#1e3a5f"/>
        <rect x="15" y="15" width="12" height="12" rx="2.5" fill="#f4b822"/>
      </svg>
    </div>
    <small class="login-eyebrow">El Cuarto Impacto</small>
    <h1>Certificación A</h1>
    <div class="sub">Sistema de gestión · Empresa Aumentada</div>

    <div id="alert"></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
    </form>

    <div class="login-foot">
      La responsabilidad digital como cuarta dimensión del valor empresarial
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/api.js"></script>
<script>
(async () => {
  await API.init();
  const user = await API.getCurrentUser();
  if (user) location.href = '/panel.html';

  const form = document.getElementById('login-form');
  const alertEl = document.getElementById('alert');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertEl.innerHTML = '';
    try {
      await API.login(
        document.getElementById('email').value,
        document.getElementById('password').value
      );
      location.href = '/panel.html';
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  });
})();
</script>
</body>
</html>
