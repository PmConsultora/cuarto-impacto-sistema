<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel · El Cuarto Impacto</title>
<link rel="icon" type="image/svg+xml" href="/img/logo.svg">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f2137">
<meta name="apple-mobile-web-app-capable" content="yes">

<body>

<div class="panel-wrap">

    <div class="brand">
      <a href="#/" class="brand-logo">
        <svg width="36" height="36" viewBox="0 0 28 28" fill="none">
          <rect x="0" y="0" width="12" height="12" rx="2.5" fill="#c8ddee"/>
          <rect x="15" y="0" width="12" height="12" rx="2.5" fill="#c8ddee"/>
          <rect x="0" y="15" width="12" height="12" rx="2.5" fill="#c8ddee"/>
          <rect x="15" y="15" width="12" height="12" rx="2.5" fill="#f4b822"/>
        </svg>
        <div>
          <small>El Cuarto Impacto</small>
          <h2>Certificación A</h2>
        </div>
      </a>
    </div>
    <nav>
      <a href="#/">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a href="#/empresas">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/><path d="M9 9v.01M9 12v.01M9 15v.01M9 18v.01"/></svg>
        Empresas
      </a>
      <a href="#/certificaciones">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.5 13l1.5 8-5-3-5 3 1.5-8"/></svg>
        Certificaciones
      </a>
      <a href="#/red">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="17" cy="6" r="3"/><path d="M21 14v-1a3 3 0 0 0-3-3h-1"/></svg>
        Red
      </a>
      <a href="#/pagos">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20M6 15h2M11 15h3"/></svg>
        Pagos
      </a>
      <a href="#/reportes">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-7"/></svg>

      </a>

      </a>
      <a href="#/adherentes-admin">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></svg>

        Diagnósticos
      </a>
      <a href="#/contactos">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>

    <div class="foot">
      <div class="foot-user">
        <div class="foot-avatar" id="user-avatar">P</div>
        <div>
          <div id="user-label">—</div>
          <div class="foot-role">Administrador</div>
        </div>
      </div>
      <button id="logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
        Cerrar sesión
      </button>

  <main class="main">
    <div id="view"><div class="empty">Cargando…</div></div>
  </main>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
